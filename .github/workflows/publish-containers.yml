name: Publish Containers

# Builds and pushes Docker images to GitHub Container Registry (GHCR).
# Triggered on pushes to main and on published releases.
# Pull-request runs are intentionally excluded — PRs must not push images.

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-containers-${{ github.ref }}
  cancel-in-progress: false   # do not cancel mid-push; prefer queueing

env:
  REGISTRY: ghcr.io
  OWNER:    rhamenator

jobs:
  publish:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # push to GHCR
      attestations: write   # build provenance / SBOM
      id-token: write       # OIDC token required for attestation signing

    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    backend
            dockerfile: backend/Dockerfile
          - service:    admin-dashboard
            dockerfile: admin-dashboard/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Buildx enables multi-platform builds and advanced cache drivers
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate OCI-compliant image tags and labels from Git metadata
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/proactive/${{ matrix.service }}
          tags: |
            # branch push → :latest (main only)
            type=raw,value=latest,enable={{is_default_branch}}
            # release tag → :v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short SHA → :sha-abc1234
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context:    .
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GHCR alongside the image
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/proactive/${{ matrix.service }}:cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/proactive/${{ matrix.service }}:cache,mode=max
          # Attach SBOM and provenance to the image manifest
          sbom:        true
          provenance:  mode=max

      # Attach a signed build-provenance attestation (Sigstore / cosign)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name:   ${{ env.REGISTRY }}/${{ env.OWNER }}/proactive/${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
