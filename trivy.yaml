# Trivy configuration for CI vulnerability scanning.
#
# ignore-unfixed: true instructs Trivy to suppress CVEs that have no available
# fix in the package ecosystem.  The node:22-alpine base image currently carries
# one high-severity CVE (CVE in the Node.js binary itself) for which no
# Alpine-level package patch has been published.  The Dockerfiles already
# contain `apk upgrade --no-cache` to pick up any OS-level fixes automatically;
# this option suppresses the noise in CI until an upstream fix is released.
#
# When a patch becomes available the `apk upgrade` step will apply it on the
# next image build and the CVE will disappear from scanning results regardless
# of this setting.

vulnerability:
  ignore-unfixed: true
